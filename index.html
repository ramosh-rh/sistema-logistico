<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Vena144 - Logística</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-body: #f8fafc;
            --white: #ffffff;
            --purple-dark: #1e1b4b;
            --purple-grad: linear-gradient(135deg, #1e1b4b 0%, #7e22ce 100%);
            --purple-light: #9333ea;
            --text-main: #334155;
            --text-light: #64748b;
            --border: #e2e8f0;
            --whatsapp: #25D366;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg-body); color: var(--text-main); padding-bottom: 50px; }

        .header { background: var(--purple-grad); color: var(--white); text-align: center; padding: 30px 20px; }
        .header h1 { font-size: 1.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;}
        .header p { font-size: 0.95rem; opacity: 0.9; margin-top: 5px; }

        .container { max-width: 750px; margin: 25px auto; padding: 0 20px; }
        .card { background: var(--white); border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 20px; border: 1px solid var(--border); }
        
        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-main); }
        .input-group input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; }
        .input-group input:focus { outline: none; border-color: var(--purple-light); }

        .btn { background: var(--purple-light); color: var(--white); border: none; padding: 16px; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; width: 100%; transition: background 0.2s; }
        .btn:hover { background: #7e22ce; }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        
        .btn-outline { background: transparent; color: var(--purple-light); border: 2px solid var(--purple-light); margin-top: 15px;}
        .btn-outline:hover { background: var(--purple-light); color: var(--white); }
        
        .btn-whatsapp { background: var(--whatsapp); color: white; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-whatsapp:hover { background: #1ebc59; }
        .btn-whatsapp svg { width: 24px; height: 24px; fill: currentColor; }

        .question-text { font-size: 1.15rem; font-weight: 700; margin-bottom: 25px; line-height: 1.5; color: var(--purple-dark); }
        .option-card { padding: 16px; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; margin-bottom: 12px; font-weight: 600; }
        .option-card.selected { border-color: var(--purple-light); background: var(--purple-light); color: var(--white); }

        .chart-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto 30px; }
        
        .highlight-box { background: #faf5ff; border-left: 5px solid var(--purple-light); padding: 20px; border-radius: 0 8px 8px 0; margin-bottom: 20px; }
        .pdi-box { background: #f0fdf4; border-left: 5px solid #16a34a; padding: 20px; border-radius: 0 8px 8px 0; margin-bottom: 20px; }
        
        .gestor-item { padding: 15px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; background: #fafafa; cursor: pointer; transition: all 0.2s; }
        .gestor-item:hover { border-color: var(--purple-light); background: #f3e8ff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>Vena144</h1>
        <p>Mapeamento de Competências Logísticas</p>
    </div>

    <div class="container">
        
        <div id="view-inicio" class="view active">
            <div class="card" id="login-section">
                <h2 style="margin-bottom: 20px; color: var(--purple-dark);">Identificação da Equipe</h2>
                <div class="input-group">
                    <label>Nome Completo</label>
                    <input type="text" id="user-name" placeholder="Ex: João da Silva">
                </div>
                <div class="input-group">
                    <label>Matrícula / ID</label>
                    <input type="text" id="user-id" placeholder="Ex: 12345">
                </div>
                <button class="btn" onclick="startQuiz()">Iniciar Avaliação</button>
                
                <button class="btn btn-outline" onclick="abrirGestor()">🔒 Acesso Restrito (Liderança)</button>
            </div>

            <div class="card" id="quiz-section" style="display: none;">
                <div style="font-size: 0.85rem; font-weight: 700; color: var(--purple-light); text-transform: uppercase; margin-bottom: 10px;" id="q-counter"></div>
                <div class="question-text" id="q-text"></div>
                <div id="options-container"></div>
                <button class="btn" id="next-btn" style="margin-top: 25px;" onclick="nextQuestion()" disabled>Confirmar e Avançar</button>
            </div>
            
            <div class="card" id="loading-section" style="display: none; text-align: center;">
                <h3 style="color: var(--purple-light);">Processando perfil e salvando...</h3>
            </div>
        </div>

        <div id="view-devolutivas" class="view">
            <div id="result-content">
                <div class="card">
                    <h3 style="text-align: center; margin-bottom: 5px; color: var(--text-light); text-transform: uppercase; font-size: 0.9rem;">Mapa Analítico</h3>
                    <h2 style="text-align: center; margin-bottom: 5px; color: var(--purple-dark);" id="res-nome"></h2>
                    <p id="res-data" style="text-align: center; color: var(--text-light); font-size: 0.85rem; margin-bottom: 25px;"></p>
                    
                    <div class="chart-container"><canvas id="polarChart"></canvas></div>
                </div>

                <div class="card">
                    <h2 id="perfil-titulo" style="color: var(--purple-dark); margin-bottom: 10px; border-bottom: 2px solid var(--border); padding-bottom: 10px;"></h2>
                    <p id="perfil-desc" style="margin-bottom: 20px; line-height: 1.6;"></p>
                    
                    <div class="highlight-box">
                        <h4>🎯 Benefícios Organizacionais</h4>
                        <p id="perfil-beneficios"></p>
                    </div>

                    <div class="pdi-box" id="box-pdi">
                        <h4>📈 Plano de Desenvolvimento (Foco: <span id="pdi-area"></span>)</h4>
                        <p id="pdi-dica"></p>
                    </div>
                    
                    <div id="area-botao-gestor"></div>
                </div>
            </div>
        </div>

        <div id="view-gestor" class="view">
            <div class="card">
                <h2 style="color: var(--purple-dark); margin-bottom: 10px;">Painel da Liderança</h2>
                <p style="color: var(--text-light); margin-bottom: 20px;">Acompanhe o desempenho da equipe.</p>
                
                <button class="btn btn-whatsapp" onclick="enviarWhatsApp()">
                    <svg viewBox="0 0 24 24"><path d="M12.031 0C5.408 0 0 5.414 0 12.046c0 2.128.552 4.196 1.6 6.023L.266 24l6.095-1.597A11.956 11.956 0 0012.031 24c6.621 0 12.031-5.414 12.031-12.046C24.062 5.414 18.652 0 12.031 0zm7.156 17.18c-.305.86-1.742 1.593-2.422 1.672-.633.078-1.46.164-4.226-.984-3.352-1.39-5.524-4.82-5.696-5.047-.164-.234-1.351-1.797-1.351-3.43 0-1.632.851-2.437 1.156-2.765.305-.328.664-.414.883-.414.219 0 .445 0 .633.008.203.008.484-.078.758.586.281.68.961 2.344 1.047 2.516.086.172.14.375.031.594-.109.219-.164.351-.328.547-.164.195-.344.422-.492.578-.164.172-.344.359-.148.695.188.336.844 1.406 1.82 2.273 1.258 1.117 2.32 1.46 2.664 1.632.344.172.547.148.75-.086.203-.234.875-1.015 1.109-1.367.234-.351.469-.289.781-.172.312.117 1.984.938 2.328 1.109.344.172.57.258.656.406.086.148.086.86-.219 1.719z"/></svg>
                    Gerar Link e Enviar no WhatsApp
                </button>
                
                <h3 style="margin-top: 10px; border-bottom: 2px solid var(--border); padding-bottom: 10px;">Avaliações Concluídas</h3>
                
                <div id="lista-avaliacoes"></div>
                
                <button class="btn btn-outline" style="margin-top: 20px;" onclick="location.reload()">Sair do Painel</button>
            </div>
        </div>
    </div>

<script>
    // ==========================================
    // 1. CONFIGURAÇÃO FIREBASE E CHART.JS
    // ==========================================
    Chart.register(ChartDataLabels);

    const firebaseConfig = {
      apiKey: "AIzaSyBINPrQHY3ViOoirPyIiWZsVzKbC2egKps",
      authDomain: "desenvolver144.firebaseapp.com",
      databaseURL: "https://desenvolver144-default-rtdb.firebaseio.com",
      projectId: "desenvolver144",
      storageBucket: "desenvolver144.firebasestorage.app",
      messagingSenderId: "258666388892",
      appId: "1:258666388892:web:0dc2d3bced1a998e287c59"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ==========================================
    // 2. FUNÇÕES DE TELA E NAVEGAÇÃO
    // ==========================================
    function switchTab(tabId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(`view-${tabId}`).classList.add('active');
    }

    // ACESSO DO GESTOR (AGORA COM BOTÃO VISÍVEL)
    function abrirGestor() {
        const senha = prompt("Digite a senha da Liderança:");
        if(senha === "144") {
            switchTab('gestor');
            loadAdminData(); // Puxa os dados da nuvem
        } else if (senha !== null) {
            alert("Senha incorreta!");
        }
    }

    function enviarWhatsApp() {
        const urlDoSistema = window.location.href.split('?')[0]; 
        const mensagem = `Olá equipe! 🚀\n\nAcessem o link abaixo e realizem o nosso Mapeamento de Perfil Logístico.\n\nDemora só 2 minutinhos e você vê o seu resultado na hora!\n\nLink: ${urlDoSistema}`;
        const urlWhatsApp = `https://api.whatsapp.com/send?text=${encodeURIComponent(mensagem)}`;
        window.open(urlWhatsApp, '_blank');
    }

    // ==========================================
    // 3. BASE DE DADOS: QUESTÕES E PERFIS
    // ==========================================
    const allQuestions = [
        { dim: 'INI', q: "Faltam 5 minutos para o intervalo e a linha parou por falta de paletes vazios. O que você faz?", opts: [{t: "Vou rapidamente até o estoque, pego o palete e destravo a linha.", p: 100}, {t: "Aviso o líder pelo rádio e aguardo.", p: 50}, {t: "Aproveito que a linha parou e saio para o intervalo.", p: 0}] },
        { dim: 'INI', q: "Você percebe que produtos pesados estão na parte mais alta da prateleira, dificultando a operação.", opts: [{t: "Anoto os códigos e sugiro à liderança uma mudança de layout.", p: 100}, {t: "Comento com os colegas que o layout é ruim.", p: 50}, {t: "Não faço nada.", p: 0}] },
        { dim: 'INI', q: "Você terminou sua lista de picking antes do fim do turno, mas outros corredores estão lotados.", opts: [{t: "Procuro a liderança e pergunto onde posso ajudar.", p: 100}, {t: "Começo a limpar meu equipamento devagar.", p: 50}, {t: "Vou para o vestiário mais cedo.", p: 0}] },
        { dim: 'ORG', q: "Ao guardar mercadorias, a caixa não cabe perfeitamente no espaço alinhado.", opts: [{t: "Arrumo as outras caixas para criar o espaço correto.", p: 100}, {t: "Coloco a caixa meio de lado.", p: 50}, {t: "Deixo no corredor para o inventário arrumar.", p: 0}] },
        { dim: 'ORG', q: "Terminou o descarregamento e sobrou plástico-filme espalhado no piso.", opts: [{t: "Recolho tudo imediatamente e jogo nas lixeiras.", p: 100}, {t: "Empurro para o canto da parede.", p: 50}, {t: "Deixo no chão e vou embora.", p: 0}] },
        { dim: 'EQP', q: "No fim de turno, como você passa o bastão para o colega que está chegando?", opts: [{t: "Repasso as pendências e o estado da máquina.", p: 100}, {t: "Aviso apenas se houver algo muito urgente parado.", p: 50}, {t: "Deixo a máquina e vou embora sem falar com ele.", p: 0}] },
        { dim: 'EQP', q: "Um colega recém-contratado está travando o fluxo.", opts: [{t: "Paro um instante, ensino um atalho e o ajudo.", p: 100}, {t: "Pego a tarefa dele e faço eu mesmo.", p: 50}, {t: "Fico impaciente e digo para ele se virar.", p: 0}] },
        { dim: 'EQP', q: "Você escuta uma fofoca negativa sobre um colega da equipe.", opts: [{t: "Corto o assunto e foco na operação.", p: 100}, {t: "Escuto, mas comento apenas com amigos próximos.", p: 50}, {t: "Espalho a notícia ou vou tirar satisfação.", p: 0}] },
        { dim: 'RES', q: "Ocorre um 'furo de estoque' crítico no meio de uma onda de pedidos urgentes.", opts: [{t: "Mantenho o controle e sigo separando outras tarefas.", p: 100}, {t: "Continuo trabalhando, mas fico nervoso.", p: 50}, {t: "Paro de trabalhar e começo a reclamar alto.", p: 0}] },
        { dim: 'RES', q: "Uma carreta não programada chega e altera as prioridades do seu dia.", opts: [{t: "Entendo a dinâmica, me reorganizo e inicio a tarefa.", p: 100}, {t: "Faço o serviço, mas reclamo da desorganização.", p: 50}, {t: "Me recuso a fazer.", p: 0}] },
        { dim: 'RES', q: "Um líder ou colega fala de forma ríspida devido ao estresse.", opts: [{t: "Entendo o calor da operação e converso depois.", p: 100}, {t: "Fico calado, guardo mágoa e passo a não ajudar.", p: 50}, {t: "Respondo no mesmo tom e inicio uma discussão.", p: 0}] },
        { dim: 'TEC', q: "Ao coletar produtos com validade, o sistema exige verificação. Qual a sua prática?", opts: [{t: "Confiro rigorosamente a data (FEFO).", p: 100}, {t: "Bipo a primeira data que vejo na frente.", p: 50}, {t: "Digito manualmente para ganhar tempo.", p: 0}] },
        { dim: 'TEC', q: "O sistema do coletor fica muito lento e trava.", opts: [{t: "Reinicio o coletor e me preparo para não parar o físico.", p: 100}, {t: "Fico aguardando de braços cruzados.", p: 50}, {t: "Uso como desculpa para ir tomar café.", p: 0}] },
        { dim: 'SEG', q: "Você precisa entrar na câmara fria por apenas 15 segundos.", opts: [{t: "Visto a japona térmica e as luvas.", p: 100}, {t: "Peço para alguém que já está lá dentro pegar.", p: 50}, {t: "Entro só de uniforme.", p: 0}] },
        { dim: 'SEG', q: "Como gerencia o uso de EPI e Celular?", opts: [{t: "Celular guardado e EPI completo 100% do tempo.", p: 100}, {t: "EPI completo, mas olho o celular de vez em quando.", p: 50}, {t: "Uso o celular enquanto opero a máquina.", p: 0}] }
    ];

    const profiles = {
        'INI': { title: "Empreendedor / Executor", desc: "Apresenta alta capacidade de iniciar ações sem depender de terceiros. Age rapidamente para destravar a operação.", ben: "Garante alto ritmo de execução logística." },
        'ORG': { title: "Convencional / Estrategista", desc: "Perfil processual, preza pelo alinhamento e precisão. Prefere que o layout funcione como planejado.", ben: "Extrema confiabilidade na conferência e redução de avarias." },
        'EQP': { title: "Social / Integrador", desc: "Atua de forma muito colaborativa. Evita conflitos e ajuda o time a fluir em harmonia.", ben: "Facilita a comunicação e eleva o clima organizacional." },
        'RES': { title: "Resiliente / Estável", desc: "Forte inteligência emocional. Lida com alta pressão e furos de estoque sem estresse.", ben: "Mantém a qualidade da operação em momentos de crise." }
    };

    const dicsPDI = {
        'INI': "Seja mais proativo: ao ver um gargalo, tome a frente para ajudar a resolver antes da cobrança.",
        'ORG': "Foque no alinhamento de paletes, limpeza do setor e processos sistemáticos do WMS.",
        'EQP': "Integre-se mais, ofereça ajuda aos colegas e faça passagens de turno impecáveis.",
        'RES': "Em momentos de pico, respire fundo, não leve cobranças para o pessoal e evite reclamações.",
        'TEC': "Dedique-se a entender as regras técnicas de FEFO/FIFO e as funcionalidades do WMS.",
        'SEG': "Elimine as exceções para não usar EPI e evite distrações com o celular durante a operação."
    };
    const dimNames = { INI: 'Iniciativa', ORG: 'Organização', EQP: 'Trabalho em Equipe', RES: 'Resiliência', TEC: 'Domínio Técnico', SEG: 'Segurança' };

    // ==========================================
    // 4. LÓGICA DO QUIZ
    // ==========================================
    let quizQuestions = [], currentQ = 0, selectedScore = null, myChart = null;
    let scores = { INI: 0, ORG: 0, EQP: 0, RES: 0, TEC: 0, SEG: 0 }, maxScores = { INI: 0, ORG: 0, EQP: 0, RES: 0, TEC: 0, SEG: 0 };

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startQuiz() {
        const nome = document.getElementById('user-name').value;
        const mat = document.getElementById('user-id').value;
        if(!nome || !mat) return alert('Por favor, preencha Nome e Matrícula.');
        
        sessionStorage.setItem('tempName', nome);
        
        quizQuestions = shuffle([...allQuestions]);
        scores = { INI: 0, ORG: 0, EQP: 0, RES: 0, TEC: 0, SEG: 0 };
        maxScores = { INI: 0, ORG: 0, EQP: 0, RES: 0, TEC: 0, SEG: 0 };
        quizQuestions.forEach(q => maxScores[q.dim] += 100);

        currentQ = 0;
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        const q = quizQuestions[currentQ];
        document.getElementById('q-counter').innerText = `Situação ${currentQ + 1} de 15`;
        document.getElementById('q-text').innerText = q.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        document.getElementById('next-btn').disabled = true;

        shuffle([...q.opts]).forEach(opt => {
            const div = document.createElement('div');
            div.className = 'option-card';
            div.innerText = opt.t;
            div.onclick = () => {
                document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                div.classList.add('selected');
                selectedScore = opt.p;
                document.getElementById('next-btn').disabled = false;
            };
            container.appendChild(div);
        });
    }

    function nextQuestion() {
        scores[quizQuestions[currentQ].dim] += selectedScore;
        currentQ++;
        if(currentQ < quizQuestions.length) loadQuestion();
        else generateDevolutiva();
    }

    function generateDevolutiva() {
        const nome = sessionStorage.getItem('tempName');
        const dataAvaliacao = new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute:'2-digit' });
        
        const pctScores = {
            INI: Math.round((scores.INI / maxScores.INI) * 100) || 0, ORG: Math.round((scores.ORG / maxScores.ORG) * 100) || 0,
            EQP: Math.round((scores.EQP / maxScores.EQP) * 100) || 0, RES: Math.round((scores.RES / maxScores.RES) * 100) || 0,
            TEC: Math.round((scores.TEC / maxScores.TEC) * 100) || 0, SEG: Math.round((scores.SEG / maxScores.SEG) * 100) || 0
        };

        let dom = 'INI', minDim = 'INI', maxVal = -1, minVal = 101;
        for (const [key, val] of Object.entries(pctScores)) {
            if (val > maxVal) { maxVal = val; dom = key; }
            if (val < minVal) { minVal = val; minDim = key; }
        }
        if (dom === 'TEC' || dom === 'SEG') dom = 'ORG'; 

        const resultData = { nome, date: dataAvaliacao, pctScores, dom, minDim };
        
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('loading-section').style.display = 'block';

        database.ref('avaliacoes').push(resultData).then(() => {
            document.getElementById('loading-section').style.display = 'none';
            // isColaborador = true (abre aba de resultado e exibe botão Sair)
            renderDevolutivaView(nome, dataAvaliacao, dom, minDim, pctScores, true);
        }).catch(err => {
            alert("Erro ao salvar: " + err.message);
        });
    }

    // ==========================================
    // 5. RENDERIZAÇÃO DO RELATÓRIO E GRÁFICO
    // ==========================================
    function renderDevolutivaView(nome, dataTexto, dom, minDim, pctScores, isColaborador = false) {
        document.getElementById('res-nome').innerText = nome;
        document.getElementById('res-data').innerText = `Realizado em: ${dataTexto}`;
        document.getElementById('perfil-titulo').innerText = `Perfil: ${profiles[dom].title}`;
        document.getElementById('perfil-desc').innerText = profiles[dom].desc;
        document.getElementById('perfil-beneficios').innerText = profiles[dom].ben;
        document.getElementById('pdi-area').innerText = dimNames[minDim];
        document.getElementById('pdi-dica').innerText = dicsPDI[minDim];

        renderChart(pctScores);
        
        const areaBotao = document.getElementById('area-botao-gestor');
        areaBotao.innerHTML = ''; 

        if(isColaborador) {
            // O colaborador vê isso quando termina
            switchTab('devolutivas');
            areaBotao.innerHTML = '<button class="btn btn-outline" onclick="location.reload()">Sair do Sistema</button>';
        } else {
            // O Gestor vê isso quando clica em alguém da lista
            switchTab('devolutivas');
            areaBotao.innerHTML = '<button class="btn btn-outline" onclick="switchTab(\'gestor\')">← Voltar para a Lista de Colaboradores</button>';
        }
    }

    function renderChart(dataScores) {
        const ctx = document.getElementById('polarChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'polarArea',
            data: {
                labels: ['Iniciativa', 'Organização', 'Equipe', 'Resiliência', 'Técnico', 'Segurança'],
                datasets: [{
                    data: [dataScores.INI, dataScores.ORG, dataScores.EQP, dataScores.RES, dataScores.TEC, dataScores.SEG],
                    backgroundColor: ['rgba(249, 115, 22, 0.9)', 'rgba(56, 189, 248, 0.9)', 'rgba(168, 85, 247, 0.9)', 'rgba(236, 72, 153, 0.9)', 'rgba(34, 197, 94, 0.9)', 'rgba(234, 179, 8, 0.9)'],
                    borderColor: '#ffffff', borderWidth: 2
                }]
            },
            options: { scales: { r: { ticks: { display: false, min: 0, max: 100 }, grid: { color: 'rgba(0, 0, 0, 0.05)' } } }, plugins: { legend: { display: false }, datalabels: { color: '#ffffff', font: { family: 'Inter', weight: 'bold', size: 11 }, formatter: function(value, context) { return value > 15 ? context.chart.data.labels[context.dataIndex] + '\n' + value + '%' : ''; }, textAlign: 'center', anchor: 'center', align: 'center' } } }
        });
    }

    // ==========================================
    // 6. CARREGAR LISTA DO GESTOR (FIREBASE)
    // ==========================================
    function loadAdminData() {
        const container = document.getElementById('lista-avaliacoes');
        container.innerHTML = '<p style="text-align:center;">Carregando...</p>';

        database.ref('avaliacoes').on('value', (snapshot) => {
            container.innerHTML = '';
            if(!snapshot.exists()) return container.innerHTML = '<p>Nenhuma avaliação ainda.</p>';

            Object.values(snapshot.val()).reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'gestor-item';
                div.innerHTML = `
                    <div><strong style="color:var(--purple-dark);font-size:1.1rem;">${item.nome}</strong><br><span style="font-size:0.85rem;color:var(--text-light);">${item.date}</span></div>
                    <div style="background:var(--purple-light);color:white;padding:6px 12px;border-radius:6px;font-size:0.8rem;font-weight:bold;">Abrir Laudo</div>`;
                
                // Ao clicar, chama a tela de relatório passando isColaborador = false (para mostrar botão de voltar)
                div.onclick = () => renderDevolutivaView(item.nome, item.date, item.dom, item.minDim, item.pctScores, false);
                container.appendChild(div);
            });
        });
    }
</script>
